<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faction Management</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles_ck_report.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Phone UI wrapper - only visible when player opens the phone item -->
    <div id="phone-wrapper" class="hidden">
        <div class="phone-device">
            <div class="phone-top-chrome">
                <!-- Dynamic Island: contains faction name + rank when phone is open -->
                <div class="phone-dynamic-island">
                    <span id="phone-faction-label"></span>
                    <span class="phone-di-sep">·</span>
                    <span id="phone-faction-rank"></span>
                </div>
            </div>
            <div class="phone-status-bar">
                <span id="phone-clock">00:00</span>
                <div class="phone-status-icons">
                    <!-- Signal bars -->
                    <svg width="17" height="12" viewBox="0 0 17 12" fill="none" aria-hidden="true">
                        <rect x="0" y="6" width="3" height="6" rx="1" fill="currentColor"/>
                        <rect x="4.5" y="4" width="3" height="8" rx="1" fill="currentColor"/>
                        <rect x="9" y="2" width="3" height="10" rx="1" fill="currentColor"/>
                        <rect x="13.5" y="0" width="3" height="12" rx="1" fill="currentColor"/>
                    </svg>
                    <!-- Wi-Fi -->
                    <svg width="16" height="12" viewBox="0 0 16 12" fill="none" aria-hidden="true">
                        <path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z" fill="currentColor"/>
                        <path d="M3.5 6.5C4.9 5.1 6.4 4.4 8 4.4s3.1.7 4.5 2.1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
                        <path d="M0.5 3.5C2.6 1.4 5.2 0.2 8 0.2s5.4 1.2 7.5 3.3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
                    </svg>
                    <!-- Battery -->
                    <svg width="25" height="12" viewBox="0 0 25 12" fill="none" aria-hidden="true">
                        <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="currentColor" stroke-opacity="0.35"/>
                        <rect x="2" y="2" width="16" height="8" rx="2" fill="currentColor"/>
                        <path d="M23 4v4a2 2 0 0 0 0-4z" fill="currentColor" fill-opacity="0.4"/>
                    </svg>
                </div>
            </div>
            <div id="phone-screen" class="phone-screen">
                <!-- faction-panel is moved here by JS when phone mode is active -->
                <div id="phone-toast-container"></div>
            </div>
            <div class="phone-bottom-chrome">
                <div class="phone-home-pill"></div>
            </div>
        </div>
    </div>

    <div id="faction-panel" class="panel hidden">
        <div class="panel-inner">
            <header class="panel-header">
                <div class="header-left">
                    <div class="header-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="header-text">
                        <h1 class="panel-title" id="panel-title">Faction Panel</h1>
                        <p class="panel-subtitle" id="panel-subtitle">Manage your faction</p>
                    </div>
                </div>
                <button type="button" class="btn-close" id="btn-close" aria-label="Close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </header>

            <div class="tabs-container">
                <div class="tabs" id="tabs">
                    <button class="tab-btn active" data-tab="overview">Overview</button>
                    <button class="tab-btn" data-tab="report">Report</button>
                    <button class="tab-btn" data-tab="members">Members</button>
                    <button class="tab-btn" data-tab="ck">CK Request</button>
                    <button class="tab-btn" data-tab="territory">Territory</button>
                    <button class="tab-btn" data-tab="reputation">Reputation</button>
                    <button class="tab-btn" data-tab="conflicts">Conflicts</button>
                    <button class="tab-btn" data-tab="cooldowns">Cooldowns</button>
                    <button class="tab-btn" data-tab="weapons">Weapons</button>
                    <button class="tab-btn" data-tab="warnings">Warnings</button>
                </div>
            </div>

            <main class="panel-content">
                <!-- Static Create Faction Button (Admin Only) -->
                <div id="admin-create-faction-container" class="admin-create-faction-container hidden">
                    <button type="button" class="btn-create-faction-static" id="btn-create-faction-static">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;">
                            <path d="M12 5v14M5 12h14"></path>
                        </svg>
                        Create New Faction
                    </button>
                </div>
                <div id="tab-content" class="tab-content" style="padding-top: 0;">
                    <!-- Tab content will be dynamically loaded here -->
                </div>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
